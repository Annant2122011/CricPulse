    <script>
        const safePlaceholder = "https://via.placeholder.com/600x350/121926/00d2ff?text=Image+Coming+Soon";

       
           const newsDatabase = [
            {
                id: 1, tag: "🏆 WORLD CUP", title: "The Grand Finale: India and New Zealand Prepare for Ultimate Glory", 
                img: "https://assets-in.bmscdn.com/discovery-catalog/events/et00490363-bnbpphzmer-landscape.jpg",
                desc: "The 2026 Men's T20 World Cup reaches its climax as two titans collide in Ahmedabad...",
                body: `<p>The stage is set in Ahmedabad for what promises to be one of the most electric T20 World Cup Finals in history. India, riding high on an undefeated streak and backed by over 130,000 screaming fans, will face a fearless New Zealand side that has absolutely demolished every bowling attack in its path.</p><p>Suryakumar Yadav's captaincy will be tested against the tactical brilliance of the Kiwi setup. India's spin trio has been the story of the tournament, effectively choking runs in the middle overs. However, New Zealand's openers have shown a willingness to attack spin from ball one, setting up a mouth-watering tactical battle.</p><p>Experts predict a high-scoring thriller on a pitch known to favor batters under the lights. The toss will be crucial, with dew expected to play a major factor in the second innings. For India, it’s a chance to solidify a dynasty; for New Zealand, it's a chance to finally shed the 'runners-up' tag in ICC global events.</p>`
            },
            {
                id: 2, tag: "🔥 SPOTLIGHT", title: "Decoding Finn Allen: The Anatomy of a 33-Ball Century", 
                img: "https://static.wixstatic.com/media/8d5194_f7c33e229d1a46f5842cc65500f6a163~mv2.png/v1/fill/w_666,h_372,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/8d5194_f7c33e229d1a46f5842cc65500f6a163~mv2.png",
                desc: "How the explosive Kiwi opener dismantled the South African attack and rewrote history...",
                body: `<p>When Finn Allen walked out to bat at Eden Gardens, few could have predicted the absolute carnage that was about to unfold. Striking the fastest century in T20 World Cup history in just 33 balls, Allen didn't just beat South Africa; he broke their tactical spirit. His innings was a masterclass in aggressive intent and unparalleled hand-eye coordination.</p><p>Data analysts tracking the innings noted that Allen completely ignored traditional footwork, instead creating a massive base in the crease to target the arc between long-on and deep mid-wicket. By staying deep in his crease, he turned Kagiso Rabada's express pace into batting practice, launching length balls deep into the Kolkata night sky.</p><p>This innings signals a terrifying shift in modern T20 openers. The concept of an 'anchor' is rapidly fading, replaced by players who view a strike rate of 200 as the bare minimum. If Allen continues this form, no target in world cricket is safe from his willow.</p>`
            },
            {
                id: 3, tag: "📈 EVOLUTION", title: "The 500-Run Frontier: Is the Ultimate ODI Record About to Fall?", 
                img: "https://www.cricindeed.com/wp-content/uploads/2026/02/fastest-400-in-odi-1024x566.jpg",
                desc: "With batting strike rates skyrocketing, experts believe the mythical 500-run mark is finally within reach...",
                body: `<p>For decades, scoring 400 runs in a One Day International was considered the absolute pinnacle of batting achievement. However, as we move through 2026, the landscape of 50-over cricket has been altered by the "T20 Generation." The current world record of 498/4 stands as a reminder that the 500-run barrier is no longer a matter of 'if,' but 'when'.</p><p>Data from the early 2026 season shows a shift in templates, with nations like India and South Africa now routinely crossing the 400-run mark—a milestone breached 30 times as of this month. This evolution is fueled by an "ultra-aggressive" top order that treats the first ten overs like a T20 powerplay.</p><p>Pundits agree that with current batting innovation exceeding bowling variations, a perfect storm of conditions will soon lead an elite lineup to shatter the 500-run ceiling, forever changing the fabric of ODI cricket.</p>`
            },
            {
                id: 4, tag: "⭐ MASTERCLASS", title: "Jasprit Bumrah's Mechanics: A Scientific Analysis", 
                img: "https://content.api.news/v3/images/bin/82340bdf69ceba068032c8f2d76f52e0",
                desc: "Breaking down the mechanics behind the most feared delivery in modern men's cricket...",
                body: `<p>There is fast bowling, and then there is Jasprit Bumrah. Biomechanists and cricket coaches alike have spent years analyzing his hyper-extended elbow and stuttering run-up, trying to figure out how a seemingly unnatural action produces the most lethal yorker in history.</p><p>Recent analysis reveals that Bumrah's release point is significantly further ahead of the popping crease. This late release creates an optical illusion for the batter, making the ball appear significantly faster than the radar gun suggests.</p><p>Furthermore, his ability to disguise the slower ball using the exact same arm speed has rendered traditional trigger movements useless. Batters are forced to commit a fraction of a second later, which is all the time Bumrah needs to shatter the base of the stumps.</p>`
            },
            {
                id: 5, tag: "💰 AUCTION", title: "IPL 2026 Mega Auction Rumors: Superstars Changing Colors", 
                img: "https://img.etimg.com/thumb/width-1200,height-900,imgsize-60568,resizemode-75,msid-125950172/news/sports/ipl-2026-auction-what-the-ten-teams-have-and-who-theyll-be-desperate-to-get.jpg",
                desc: "Franchises are gearing up for the biggest auction in years. Who goes where?...",
                body: `<p>The upcoming IPL Mega Auction is already sending shockwaves through the franchise cricket landscape. With teams only allowed a maximum of four retentions, several marquee players and international captains are set to hit the open market, triggering a historic bidding war.</p><p>Rumors are swirling around leadership transitions. With veteran players nearing the twilight of their careers, franchises are hunting for young, aggressive core players to build their next decade around. Overseas fast bowlers are expected to command astronomical price tags.</p><p>All eyes are on the purse expansions. With the salary cap increased, we could see the 30-crore barrier breached for the first time. Analysts are crunching numbers to uncover hidden gems in associate nations to balance their massive marquee buys.</p>`
            },
            {
                id: 6, tag: "📉 TEAM ANALYSIS", title: "Pakistan's Transition Phase: Rebuilding the Men in Green", 
                img: "https://wallpapers.com/images/hd/pakistan-cricket-team-huddle-n0agyv3wqh2gh0ek.jpg",
                desc: "A deep dive into the structural changes needed for Pakistan to bounce back...",
                body: `<p>Following a string of early exits in global tournaments, the PCB has initiated a massive overhaul of both the playing squad and the domestic structure. The primary issue highlighted has been a stagnation in batting intent.</p><p>The new coaching staff has publicly demanded a shift toward ultra-aggressive powerplay tactics. There is also a pressing need to groom the next generation of express fast bowlers. While Shaheen Afridi remains a lethal threat, the supporting cast has struggled with inconsistency.</p><p>The upcoming domestic season will be closely monitored to fast-track raw, express pace talent straight into the national academy. Rebuilding the "Men in Green" will require patience, but the raw talent in the region remains undeniable.</p>`
            },
            {
                id: 7, tag: "🌪️ SPIN KINGS", title: "Rashid Khan's Continued Dominance in T20 Cricket", 
                img: "https://media.crictracker.com/media/attachments/1726817539972_Rashid-Khan.jpeg",
                desc: "Why the Afghan maestro remains the most sought-after T20 bowler on the planet...",
                body: `<p>In an era where batters are hitting the ball harder than ever, Rashid Khan remains the ultimate cheat code. As he enters the veteran stage, the Afghan leg-spinner has only become more lethal, relying on subtle variations in pace.</p><p>What sets Rashid apart is his arm speed. Bowling at speeds pushing 100kph, he deprives the batter of any time to adjust. This turns his wrong'un from a variation into his primary weapon of mass destruction.</p><p>Franchises around the globe build their auction strategies around him. He virtually guarantees four overs for under 25 runs, taking the pressure off the rest of the attack. His evolution from a mystery spinner to a calculated tactician ensures his reign at the top will continue.</p>`
            },
            {
                id: 8, tag: "🚑 INJURY WARD", title: "Australia's Pace Dilemma: Coping Without the Big Three", 
                img: "https://img1.hscicdn.com/image/upload/f_auto,t_ds_w_1200,q_60/lsci/db/PICTURES/CMS/371700/371717.jpg",
                desc: "How the Aussies are managing their fast-bowling stocks amidst an injury crisis...",
                body: `<p>The Australian Men's team faces an unprecedented crisis with Cummins, Starc, and Hazlewood nursing simultaneous long-term injuries. The famed pace cartel has been temporarily disbanded, forcing selectors to test their depth.</p><p>This has provided a golden opportunity for Nathan Ellis and Spencer Johnson. Johnson's left-arm angle and raw pace have particularly impressed pundits, though the lack of experience has shown in high-pressure death overs.</p><p>Australia's traditional strategy of intimidating teams with pace has had to shift towards variations and cutters. Management is working with medical staff to ensure the veterans are fit for the upcoming Test summer.</p>`
            },
            {
                id: 9, tag: "🚀 RISING STAR", title: "Yashasvi Jaiswal: An All-Format Juggernaut", 
                img: "https://images.news18.com/ibnlive/uploads/2025/08/Yashasvi-Jaiswal-smashes-his-6th-Test-hundred-2025-08-b1ef92d59ff08feb052209e499cca81e.jpg",
                desc: "From playing in the maidans to international attacks, Jaiswal's incredible rise...",
                body: `<p>Beyond the inspirational backstory lies a technically brilliant, ruthlessly aggressive batter taking all three formats by storm. Jaiswal possesses a rare ability to seamlessly transition gears between red and white-ball cricket.</p><p>In Test cricket, he has shown the patience to bat for hours, while in T20s, he routinely destroys bowling plans within the first six overs. Indian management views him as the definitive all-format successor to the previous generation of greats.</p><p>With a solid technique against both high-pace bouncers and turning deliveries, Jaiswal has no obvious weakness. He is a nightmare for opposition analysts formulating a plan against him.</p>`
            },
            {
                id: 10, tag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 COMEBACK", title: "Jofra Archer's Return: Can He Reclaim His Throne?", 
                img: "https://media.wired.com/photos/65e8837890df942d70c0b517/master/w_1600%2Cc_limit/gettyimages-1169337851.jpg",
                desc: "The English speedster is back, but is he the same terrifying force?...",
                body: `<p>The sight of Jofra Archer charging in is enough to give openers sleepless nights. After years of agonizing injuries, the English tearaway is finally back, and the world is watching closely to see if he still has that 155kph fear factor.</p><p>Early signs suggest the smooth, effortless run-up remains intact. However, he is currently operating slightly below his terrifying peak to preserve his body. This deliberate medical strategy focuses on seam movement and heavy lengths.</p><p>England's management is treating him like a fragile diamond, resting him strategically. If Archer can manage his workload and adapt his game to rely on intelligence over speed, he remains the most dangerous bowler in the world.</p>`
            },
            {
                id: 11, tag: "💥 POWER HITTER", title: "Nicholas Pooran Signs Record Global Deal", 
                img: "https://images.indianexpress.com/2024/06/New-Project-2024-06-18T111304.347.jpg",
                desc: "The West Indian wicketkeeper-batter redefines the modern freelancer contract...",
                body: `<p>In a watershed moment, West Indian powerhouse Nicholas Pooran has signed an unprecedented multi-league contract with a single franchise ownership group. This deal secures his services across the IPL, SA20, ILT20, and CPL under one massive umbrella.</p><p>This move highlights shifting power dynamics where private franchises offer contracts that dwarf national board retainers. Pooran capitalized on high demand to secure financial security for life, setting a new blueprint for elite T20 specialists.</p><p>While a win for the player, it raises questions about international availability. National boards struggle to field strong XIs as stars prioritize franchise commitments. The era of the global cricket freelancer has officially evolved.</p>`
            },
           {
                id: 12, tag: "💔 HEARTBREAK", title: "The Semi-Final Curse: South Africa's Search for Answers", 
                img: "https://images.mid-day.com/images/images/2026/mar/sa-loss-sad-a-1772757973376_d.png",
                desc: "Another knockout stage, another bitter exit for the Proteas Men...",
                body: `<p>The post-match dressing room in Kolkata painted a painfully familiar picture for South African cricket fans. Despite boasting a squad filled with generational talent and dominating the group stages, the Proteas once again faltered when the pressure was at its absolute highest in a World Cup Semi-Final.</p><p>Analysts are struggling to pinpoint a technical flaw. The bowling attack was balanced, and the middle order featured some of the most destructive hitters in the world. However, the recurring theme seems to be psychological. When put under the pump by Finn Allen's early blitz, the team’s body language visibly dropped, and plans were hastily abandoned.</p><p>The South African board now faces tough questions regarding mental conditioning. The undeniable talent is there, but until the psychological ghost of past tournaments is exorcised, the Proteas will continue to hit a glass ceiling on the global stage. A complete reset of their knockout-match mentality is required.</p>`
            },
            {
                id: 13, tag: "👑 LEGEND WATCH", title: "Virat Kohli's Next Chapter: Focusing on the Red Ball?", 
                img: "https://sportscafe.in/img/es3/articles/cricket-2023/Virat_Kohli_WI_vs_IND_Port_of_Spain_AP.scorimg.webp",
                desc: "As T20Is fade into the rearview, Kohli sets his sights on dominating Test cricket once more...",
                body: `<p>Following his glorious exit from T20 Internationals, the modern master Virat Kohli has recalibrated his absolute focus toward the purest format of the game. Sources close to the Indian camp suggest Kohli is currently undergoing intense conditioning camps designed specifically for the rigors of five-day cricket.</p><p>Without the constant burden of switching formats and adapting to the hyper-aggressive T20 demands, Kohli is reportedly tweaking his technique to tighten his defense outside the off-stump—a zone bowlers have targeted in recent years. His desire to score big hundreds in challenging overseas conditions remains as fiery as ever.</p><p>For cricket purists, the prospect of a refreshed, singular-focused Virat Kohli operating in Test cricket is a mouth-watering thought. With crucial tours to England and Australia looming in the World Test Championship cycle, India will rely heavily on their talisman to anchor the innings and guide the younger generation.</p>`
            },
            {
                id: 14, tag: "🌍 GLOBAL EXPANSION", title: "USA Cricket's Rapid Ascent in the Men's Arena", 
                img: "https://media.gq.com/photos/6679b30493d5fc4f576cdfd2/16:9/w_2000,h_1125,c_limit/cricket.jpg",
                desc: "How the United States is slowly but surely becoming a legitimate cricketing force...",
                body: `<p>The United States Men's cricket team is no longer just a novelty act on the associate circuit. Following their impressive hosting of the World Cup matches and a string of upsets against full-member nations, USA Cricket is demanding a seat at the table, fueled by massive financial injections and a booming local league.</p><p>The success of Major League Cricket (MLC) has fundamentally changed the landscape. By importing world-class international talent, domestic American players are being exposed to elite standards on a daily basis. This rapid development program has unearthed genuine fast bowlers and aggressive middle-order bats previously hidden in the diaspora.</p><p>The ICC is watching closely. The US market represents the final frontier for cricket's commercial expansion. If the Men's national team can secure automatic qualification for the next World Cup, it could trigger an explosion in broadcast rights and sponsorship that would alter the global economy of the sport forever.</p>`
            },
            {
                id: 15, tag: "⚔️ CAPTAINCY", title: "The Burden of Leadership: Ben Stokes' Battle", 
                img: "https://e0.365dm.com/22/04/2048x1152/skysports-ben-stokes_5753476.png?20220427173533",
                desc: "England's Test captain faces a crucial crossroad in his illustrious career...",
                body: `<p>Ben Stokes is undeniably the spiritual heartbeat of the English Men's Test team. His 'Bazball' philosophy revolutionized the way England approached the five-day game, turning them into a relentless, entertaining force. However, the physical toll of his all-action style and chronic knee issues are forcing a difficult conversation.</p><p>Stokes has pushed his body to the absolute limit for his country, often bowling marathon spells through immense pain. Medical experts suggest that to prolong his career, he may have to permanently transition into a specialist batter. This creates a massive imbalance in the English side, which heavily relies on his all-rounder capabilities to balance the team sheet.</p><p>Furthermore, the mental fatigue of constant high-pressure decision-making is evident. While his tactical genius remains sharp, the weight of the captaincy during tough away tours has tested his resolve. English cricket faces a defining summer as they manage their most prized asset, ensuring they don't lose both a captain and a match-winner prematurely.</p>`
            }
        ];

        function loadNewsCards() {
            const container = document.getElementById('news-container');
            let htmlContent = '';

            newsDatabase.forEach(news => {
                htmlContent += `
                    <article class="ultra-news-card" onclick="openUltraModal(${news.id})">
                        <div class="ultra-news-img-placeholder">
                            <img src="${news.img}" alt="News Placeholder" class="ultra-news-img">
                        </div>
                        <div class="ultra-news-content">
                            <span class="ultra-news-tag">${news.tag}</span>
                            <h3 class="ultra-news-title">${news.title}</h3>
                            <p>${news.desc}</p>
                            <span class="ultra-read-more">Read Article ➔</span>
                        </div>
                    </article>
                `;
            });

            container.innerHTML = htmlContent;
        }

        function openUltraModal(id) {
            const article = newsDatabase.find(item => item.id === id);
            if(article) {
                document.getElementById('ultra-modal-tag').innerText = article.tag;
                document.getElementById('ultra-modal-title').innerText = article.title;
                document.getElementById('ultra-modal-img').src = article.img;
                document.getElementById('ultra-modal-body').innerHTML = article.body;
                
                const modal = document.getElementById('ultra-modal');
                modal.style.display = 'flex';
                // Trigger animation frame
                setTimeout(() => { modal.classList.add('show-modal'); }, 10);
                document.body.style.overflow = 'hidden'; 
            }
        }

        function closeUltraModal() {
            const modal = document.getElementById('ultra-modal');
            modal.classList.remove('show-modal');
            setTimeout(() => { modal.style.display = 'none'; }, 300); // Wait for fade out
            document.body.style.overflow = 'auto'; 
        }

        // Click outside to close
        window.onclick = function(event) {
            const modal = document.getElementById('ultra-modal');
            if (event.target === modal) {
                closeUltraModal();
            }
        }

        window.onload = loadNewsCards;
    </script>

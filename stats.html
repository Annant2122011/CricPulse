<body>

    <header>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>

            <button id="back-btn" class="btn" style="display: none;" onclick="goBack()">&#8592; Back</button>
        </div>

        <div id="dynamic-container" class="news-grid">
            </div>
    </main>

    <footer>
        <p>&copy; 2026 CricPulse. All rights reserved.</p>
    </footer>

                    { id: "sa10", name: "Anrich Nortje", role: "Bowler", image: "#", stats: { matches: 38, wickets: 53, eco: 7.14, best: "4/7", sr: 15.6 } },

                ]
            }
        };

        // State Trackers
        let currentView = 'teams'; 
        let selectedTeam = null;

        const container = document.getElementById('dynamic-container');
        const pageTitle = document.getElementById('page-title');
        const backBtn = document.getElementById('back-btn');

        // 1. Show Teams (Flags)
        function showTeams() {
            currentView = 'teams';
            selectedTeam = null;
            pageTitle.innerText = "Select a T20 Team";
            backBtn.style.display = "none";
            container.innerHTML = '';
            container.className = 'news-grid'; 

            for (const teamKey in statsDatabase) {
                const team = statsDatabase[teamKey];
                container.innerHTML += `
                    <div class="team-card card" style="text-align: center; cursor: pointer;" onclick="showPlayers('${teamKey}')">
                        <img src="${team.flag}" alt="${team.name} Flag" style="width: 150px; border-radius: 8px; margin-bottom: 15px; border: 2px solid var(--accent-blue);">
                        <h3 style="color: var(--text-bright);">${team.name}</h3>
                    </div>
                `;
            }
        }

        // 2. Show Players for a Specific Team
        function showPlayers(teamKey) {
            currentView = 'players';
            selectedTeam = teamKey;
            const team = statsDatabase[teamKey];
            
            pageTitle.innerText = `${team.name} T20 Squad`;
            backBtn.style.display = "inline-block";
            container.innerHTML = '';
            container.className = 'news-grid'; 

            team.players.forEach((player, index) => {
                const initial = player.name.charAt(0);
                const imageHtml = player.image === "#" 
                    ? `<div style="width: 100px; height: 100px; border-radius: 50%; background-color: var(--accent-blue); color: var(--bg-main); font-size: 2.5rem; font-weight: bold; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px auto; border: 3px solid var(--accent-neon);">${initial}</div>`
                    : `<img src="${player.image}" alt="Player" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent-neon); margin-bottom: 15px;">`;

                container.innerHTML += `
                    <div class="player-card card" style="cursor: pointer; text-align: center;" onclick="showPlayerStats('${teamKey}', ${index})">
                        ${imageHtml}
                        <h3 style="color: var(--text-bright);">${player.name}</h3>
                        <p style="color: var(--text-dim);">${player.role}</p>
                    </div>
                `;
            });
        }

        // 3. Show Specific Player Stats
        function showPlayerStats(teamKey, playerIndex) {
            currentView = 'stats';
            const player = statsDatabase[teamKey].players[playerIndex];
            
            pageTitle.innerText = `${player.name} - T20I Stats`;
            container.innerHTML = '';
            container.className = ''; 

            let statsHtml = '';
            if (player.stats.runs !== undefined) {
                statsHtml = `
                    <div class="stat-box"><h4>Matches</h4><p>${player.stats.matches}</p></div>
                    <div class="stat-box"><h4>Runs</h4><p>${player.stats.runs}</p></div>
                    <div class="stat-box"><h4>Average</h4><p>${player.stats.avg}</p></div>
                    <div class="stat-box"><h4>Strike Rate</h4><p>${player.stats.sr}</p></div>
                    <div class="stat-box"><h4>High Score</h4><p>${player.stats.hs}</p></div>
                `;
            } else {
                statsHtml = `
                    <div class="stat-box"><h4>Matches</h4><p>${player.stats.matches}</p></div>
                    <div class="stat-box"><h4>Wickets</h4><p>${player.stats.wickets}</p></div>
                    <div class="stat-box"><h4>Economy</h4><p>${player.stats.eco}</p></div>
                    <div class="stat-box"><h4>Strike Rate</h4><p>${player.stats.sr}</p></div>
                    <div class="stat-box"><h4>Best Bowling</h4><p>${player.stats.best}</p></div>
                `;
            }

            const initial = player.name.charAt(0);
            const imageHtml = player.image === "#" 
                ? `<div style="width: 150px; height: 150px; border-radius: 50%; background-color: var(--accent-blue); color: var(--bg-main); font-size: 4rem; font-weight: bold; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border: 4px solid var(--accent-neon);">${initial}</div>`
                : `<img src="${player.image}" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid var(--accent-blue); margin-bottom: 20px;">`;

            container.innerHTML = `
                <div class="card" style="display: flex; flex-direction: column; align-items: center; padding: 40px;">
                    ${imageHtml}
                    <h2 style="color: var(--accent-neon); margin-bottom: 5px;">${player.name}</h2>
                    <p style="color: var(--text-dim); margin-bottom: 30px; font-size: 1.2rem;">${player.role}</p>
                    
                    <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%;">
                        ${statsHtml}
                    </div>
                </div>
            `;
        }

        // Handle the Back Button Logic
        function goBack() {
            if (currentView === 'stats') {
                showPlayers(selectedTeam);
            } else if (currentView === 'players') {
                showTeams();
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', showTeams);
    </script>
</body>
</html>

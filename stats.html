    <style>
        /* Smooth transition animations for dynamically loaded cards */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-card {
            animation: slideUpFade 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0; /* Starts hidden until animation takes over */
        }

        /* Enhanced Back Button */
        .neon-back-btn {
            background: linear-gradient(45deg, #121926, #0a0e17);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        .neon-back-btn:hover {
            background: var(--accent-blue);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
            transform: translateX(-5px); /* Slides left slightly on hover */
        }
        
        /* Auto-Avatar styling */
        .player-img-fill {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>

                ]
            }
        };

        let currentView = 'teams'; 
        let selectedTeam = null;
        let radarChartInstance = null; 

        const container = document.getElementById('dynamic-container');
        const pageTitle = document.getElementById('page-title');
        const backBtn = document.getElementById('back-btn');

        function showTeams() {
            currentView = 'teams';
            selectedTeam = null;
            pageTitle.innerText = "Select a T20 Team";
            backBtn.style.display = "none";
            container.innerHTML = '';
            container.className = 'news-grid'; 

            let delay = 0;
            for (const teamKey in statsDatabase) {
                const team = statsDatabase[teamKey];
                container.innerHTML += `
                    <div class="team-card card animate-card" style="text-align: center; cursor: pointer; animation-delay: ${delay}s;" onclick="showPlayers('${teamKey}')">
                        <img src="${team.flag}" alt="${team.name} Flag" style="width: 150px; border-radius: 8px; margin-bottom: 15px; border: 2px solid var(--accent-blue); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);">
                        <h3 style="color: var(--text-bright); text-transform: uppercase; letter-spacing: 2px;">${team.name}</h3>
                    </div>
                `;
                delay += 0.1;
            }
        }

        function showPlayers(teamKey) {
            currentView = 'players';
            selectedTeam = teamKey;
            const team = statsDatabase[teamKey];
            
            pageTitle.innerText = `${team.name} T20 Squad`;
            backBtn.style.display = "inline-block";
            container.innerHTML = '';
            container.className = 'news-grid'; 

            team.players.forEach((player, index) => {
                const avatarUrl = player.image === "#" 
                    ? `https://ui-avatars.com/api/?name=${encodeURIComponent(player.name)}&background=0a0e17&color=00d2ff&size=150&bold=true`
                    : player.image;

                let badgeColor = "var(--accent-blue)";
                if(player.role.includes("Batter")) badgeColor = "var(--accent-neon)";
                if(player.role.includes("All-Rounder")) badgeColor = "#ff9900";

                const animDelay = (index * 0.05).toFixed(2);

                container.innerHTML += `
                    <div class="player-card card animate-card" style="animation-delay: ${animDelay}s;" onclick="showPlayerStats('${teamKey}', ${index})">
                        <div class="role-badge" style="background: ${badgeColor}; color: #000; padding: 5px 25px; box-shadow: 0 0 10px ${badgeColor};">${player.role}</div>
                        <div class="player-avatar-placeholder" style="border: none; background: transparent;">
                            <img src="${avatarUrl}" alt="${player.name}" class="player-img-fill" style="border: 3px solid ${badgeColor}; box-shadow: 0 0 15px ${badgeColor};">
                        </div>
                        <h3 style="color: var(--text-bright); font-size: 1.4rem;">${player.name}</h3>
                        <p style="color: var(--accent-blue); font-size: 0.85rem; margin-top: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">View Profile ➔</p>
                    </div>
                `;
            });
        }

        function showPlayerStats(teamKey, playerIndex) {
            currentView = 'stats';
            const player = statsDatabase[teamKey].players[playerIndex];
            
            pageTitle.innerText = `${player.name} - Profile`;
            container.innerHTML = '';
            container.className = ''; 

            let statsHtml = '';
            
            // MAGIC UPGRADE: If they are an All-Rounder (having both runs and wickets), show a hybrid view!
            if (player.stats.runs !== undefined && player.stats.wickets !== undefined) {
                statsHtml = `
                    <div class="stat-box"><h4>Matches</h4><p>${player.stats.matches}</p></div>
                    <div class="stat-box"><h4>Runs</h4><p>${player.stats.runs}</p></div>
                    <div class="stat-box"><h4>Strike Rate</h4><p>${player.stats.sr}</p></div>
                    <div class="stat-box"><h4>Wickets</h4><p>${player.stats.wickets}</p></div>
                    <div class="stat-box"><h4>Economy</h4><p>${player.stats.eco}</p></div>
                `;
            } 
            // Standard Batter View
            else if (player.stats.runs !== undefined) {
                statsHtml = `
                    <div class="stat-box"><h4>Matches</h4><p>${player.stats.matches}</p></div>
                    <div class="stat-box"><h4>Runs</h4><p>${player.stats.runs}</p></div>
                    <div class="stat-box"><h4>Average</h4><p>${player.stats.avg}</p></div>
                    <div class="stat-box"><h4>Strike Rate</h4><p>${player.stats.sr}</p></div>
                    <div class="stat-box"><h4>High Score</h4><p>${player.stats.hs}</p></div>
                `;
            } 
            // Standard Bowler View
            else {
                statsHtml = `
                    <div class="stat-box"><h4>Matches</h4><p>${player.stats.matches}</p></div>
                    <div class="stat-box"><h4>Wickets</h4><p>${player.stats.wickets}</p></div>
                    <div class="stat-box"><h4>Economy</h4><p>${player.stats.eco}</p></div>
                    <div class="stat-box"><h4>Best Bowling</h4><p>${player.stats.best}</p></div>
                    <div class="stat-box" style="display:none;"><p></p></div>
                `;
            }

            const avatarUrl = player.image === "#" 
                ? `https://ui-avatars.com/api/?name=${encodeURIComponent(player.name)}&background=0a0e17&color=00d2ff&size=200&bold=true`
                : player.image;

            container.innerHTML = `
                <div class="stats-layout animate-card">
                    <div class="card profile-info" style="border: 1px solid var(--accent-blue); box-shadow: inset 0 0 30px rgba(0, 210, 255, 0.05);">
                        <img src="${avatarUrl}" class="player-avatar large" style="width: 180px; height: 180px; border-radius: 50%; object-fit: cover; border: 4px solid var(--accent-neon); margin-bottom: 20px; box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);">
                        <h2 style="color: var(--text-bright); font-size: 2.2rem; margin-bottom: 5px;">${player.name}</h2>
                        <h4 style="color: var(--text-dim); margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase;">${player.role}</h4>
                        <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; width: 100%;">
                            ${statsHtml}
                        </div>
                    </div>
                    
                    <div class="card chart-container" style="border: 1px solid var(--accent-neon); box-shadow: inset 0 0 30px rgba(0, 255, 136, 0.05);">
                        <h3 style="text-align: center; color: var(--text-bright); margin-bottom: 15px; letter-spacing: 1px;">Player Impact Radar</h3>
                        <div class="canvas-wrapper" style="position: relative; height: 350px; width: 100%;">
                            <canvas id="radarChart"></canvas>
                        </div>
                    </div>
                </div>
            `;

            drawRadarChart(player.name, player.radarStats);
        }

        function drawRadarChart(playerName, radarData) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            
            if (radarChartInstance) {
                radarChartInstance.destroy();
            }

            radarChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Impact', 'Aggression/Control', 'Consistency', 'Current Form', 'X-Factor'],
                    datasets: [{
                        label: playerName,
                        data: radarData,
                        backgroundColor: 'rgba(0, 255, 136, 0.2)', 
                        borderColor: '#00ff88', 
                        pointBackgroundColor: '#00d2ff', 
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#00d2ff',
                        borderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            pointLabels: {
                                color: '#94a3b8',
                                font: { size: 13, family: "'Segoe UI', sans-serif", weight: 'bold' }
                            },
                            ticks: { display: false, min: 0, max: 100 }
                        }
                    },
                    plugins: {
                        legend: { labels: { color: '#ffffff', font: { size: 14, weight: 'bold' } } }
                    }
                }
            });
        }

        function goBack() {
            if (currentView === 'stats') showPlayers(selectedTeam);
            else if (currentView === 'players') showTeams();
        }

        document.addEventListener('DOMContentLoaded', showTeams);
    </script>
</body>

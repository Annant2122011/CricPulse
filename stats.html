            { id: "sa5", name: "David Miller", role: "Batter", image: "#", stats: { matches: 134, runs: 2618, avg: 35.8, sr: 144.2 }, radarStats: [90, 85, 90, 85, 88] },
            { id: "sa6", name: "Tristan Stubbs", role: "Batter", image: "#", stats: { matches: 45, runs: 894, avg: 29.5, sr: 158.2 }, radarStats: [88, 92, 75, 85, 90] },
            { id: "sa7", name: "Marco Jansen", role: "All-Rounder", image: "#", stats: { matches: 25, wickets: 32, eco: 8.35 }, radarStats: [85, 88, 75, 85, 88] },

            { id: "sa11", name: "Lungi Ngidi", role: "Bowler", image: "#", stats: { matches: 42, wickets: 62, eco: 8.55 }, radarStats: [85, 82, 78, 80, 75] }
                ]
            },
            "AUS": {
                name: "Australia",
                flag: "https://flagcdn.com/w320/au.png",
                players: [
                    { id: "aus1", name: "Travis Head", role: "Batter", image: "#", stats: { matches: 53, runs: 1335, avg: 28.4, sr: 156.69 }, radarStats: [92, 98, 75, 90, 95] },
            { id: "aus2", name: "Mitchell Marsh", role: "All-Rounder (C)", image: "#", stats: { matches: 72, runs: 1840, avg: 32.5, sr: 138.2 }, radarStats: [88, 85, 80, 85, 85] },
            { id: "aus3", name: "Steve Smith", role: "Batter", image: "#", stats: { matches: 67, runs: 1100, avg: 24.5, sr: 125.2 }, radarStats: [85, 70, 95, 80, 75] },

            { id: "aus6", name: "Glenn Maxwell", role: "All-Rounder", image: "#", stats: { matches: 126, runs: 2835, wickets: 49 }, radarStats: [95, 95, 65, 80, 98] },
            { id: "aus7", name: "Marcus Stoinis", role: "All-Rounder", image: "#", stats: { matches: 83, runs: 1361, wickets: 49 }, radarStats: [82, 85, 75, 82, 85] },
            { id: "aus8", name: "Tim David", role: "Batter", image: "#", stats: { matches: 54, runs: 1038, avg: 36.0, sr: 175.04 }, radarStats: [88, 95, 75, 80, 90] },
            { id: "aus9", name: "Nathan Ellis", role: "Bowler", image: "#", stats: { matches: 32, wickets: 50, eco: 7.85 }, radarStats: [82, 80, 85, 85, 80] },
            { id: "aus10", name: "Xavier Bartlett", role: "Bowler", image: "#", stats: { matches: 18, wickets: 22, eco: 7.8 }, radarStats: [80, 85, 75, 88, 85] },
            { id: "aus11", name: "Adam Zampa", role: "Bowler", image: "#", stats: { matches: 111, wickets: 139, eco: 7.22 }, radarStats: [92, 80, 90, 95, 90] }
                ]
            }
        };

        let currentView = 'teams'; 
        let selectedTeam = null;
        let radarChartInstance = null; 

        const container = document.getElementById('dynamic-container');
        const pageTitle = document.getElementById('page-title');
        const backBtn = document.getElementById('back-btn');

        function showTeams() {
            currentView = 'teams';
            selectedTeam = null;
            pageTitle.innerText = "Select a T20 Team (2026 Squads)";
            backBtn.style.display = "none";
            container.innerHTML = '';
            container.className = 'news-grid'; 

            for (const teamKey in statsDatabase) {
                const team = statsDatabase[teamKey];
                container.innerHTML += `
                    <div class="team-card card" style="text-align: center; cursor: pointer;" onclick="showPlayers('${teamKey}')">
                        <img src="${team.flag}" alt="${team.name} Flag" style="width: 150px; border-radius: 8px; margin-bottom: 15px; border: 2px solid var(--accent-blue); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);">
                        <h3 style="color: var(--text-bright); text-transform: uppercase; letter-spacing: 2px;">${team.name}</h3>
                    </div>
                `;
            }
        }

        function showPlayers(teamKey) {
            currentView = 'players';
            selectedTeam = teamKey;
            const team = statsDatabase[teamKey];
            
            pageTitle.innerText = `${team.name} T20 Squad`;
            backBtn.style.display = "inline-block";
            container.innerHTML = '';
            container.className = 'news-grid'; 

            team.players.forEach((player, index) => {
                const initial = player.name.charAt(0);
                const imageHtml = player.image === "#" 
                    ? `<div class="player-avatar-placeholder">${initial}</div>`
                    : `<img src="${player.image}" alt="Player" class="player-avatar">`;

                let badgeColor = "var(--accent-blue)";
                if(player.role.includes("Batter")) badgeColor = "var(--accent-neon)";
                if(player.role.includes("All-Rounder")) badgeColor = "#ff9900";

                container.innerHTML += `
                    <div class="player-card card" onclick="showPlayerStats('${teamKey}', ${index})">
                        <div class="role-badge" style="background: ${badgeColor};">${player.role}</div>
                        ${imageHtml}
                        <h3 style="color: var(--text-bright); font-size: 1.4rem;">${player.name}</h3>
                        <p style="color: var(--text-dim); font-size: 0.9rem; margin-top: 5px;">Click for detailed stats</p>
                    </div>
                `;
            });
        }

        function showPlayerStats(teamKey, playerIndex) {
            currentView = 'stats';
            const player = statsDatabase[teamKey].players[playerIndex];
            
            pageTitle.innerText = `${player.name} - T20 Profile`;
            container.innerHTML = '';
            container.className = ''; 

            let statsHtml = '';
            if (player.stats.runs !== undefined) {
                statsHtml = `
                    <div class="stat-box"><h4>Matches</h4><p>${player.stats.matches}</p></div>
                    <div class="stat-box"><h4>Runs</h4><p>${player.stats.runs}</p></div>
                    <div class="stat-box"><h4>Average</h4><p>${player.stats.avg}</p></div>
                    <div class="stat-box"><h4>Strike Rate</h4><p>${player.stats.sr}</p></div>
                    <div class="stat-box"><h4>High Score</h4><p>${player.stats.hs}</p></div>
                `;
            } else {
                statsHtml = `
                    <div class="stat-box"><h4>Matches</h4><p>${player.stats.matches}</p></div>
                    <div class="stat-box"><h4>Wickets</h4><p>${player.stats.wickets}</p></div>
                    <div class="stat-box"><h4>Economy</h4><p>${player.stats.eco}</p></div>
                    <div class="stat-box"><h4>Strike Rate</h4><p>${player.stats.sr}</p></div>
                    <div class="stat-box"><h4>Best Bowling</h4><p>${player.stats.best}</p></div>
                `;
            }

            const initial = player.name.charAt(0);
            const imageHtml = player.image === "#" 
                ? `<div class="player-avatar-placeholder large">${initial}</div>`
                : `<img src="${player.image}" class="player-avatar large" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid var(--accent-blue); margin-bottom: 20px;">`;

            // FIXED THE CHART CONTAINER HERE
            container.innerHTML = `
                <div class="stats-layout">
                    <div class="card profile-info">
                        ${imageHtml}
                        <h2 style="color: var(--text-bright); font-size: 2.2rem; margin-bottom: 5px;">${player.name}</h2>
                        <h4 style="color: var(--accent-neon); margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase;">${player.role}</h4>
                        <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; width: 100%;">
                            ${statsHtml}
                        </div>
                    </div>
                    
                    <div class="card chart-container">
                        <h3 style="text-align: center; color: var(--accent-blue); margin-bottom: 15px;">Player Impact Radar</h3>
                        <div class="canvas-wrapper" style="position: relative; height: 350px; width: 100%;">
                            <canvas id="radarChart"></canvas>
                        </div>
                    </div>
                </div>
            `;

            drawRadarChart(player.name, player.radarStats);
        }

        function drawRadarChart(playerName, radarData) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            
            if (radarChartInstance) {
                radarChartInstance.destroy();
            }

            radarChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Impact Rating', 'Aggression/Control', 'Consistency', 'Current Form', 'X-Factor'],
                    datasets: [{
                        label: playerName,
                        data: radarData,
                        backgroundColor: 'rgba(0, 210, 255, 0.2)', 
                        borderColor: '#00d2ff', 
                        pointBackgroundColor: '#00ff88', 
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#00ff88',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, // Now safe to use because of the parent wrapper height
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            pointLabels: {
                                color: '#94a3b8',
                                font: { size: 12, family: "'Segoe UI', sans-serif", weight: 'bold' }
                            },
                            ticks: {
                                display: false,
                                min: 0,
                                max: 100
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            labels: { color: '#ffffff', font: { size: 14 } }
                        }
                    }
                }
            });
        }

        function goBack() {
            if (currentView === 'stats') showPlayers(selectedTeam);
            else if (currentView === 'players') showTeams();
        }

        document.addEventListener('DOMContentLoaded', showTeams);
    </script>
</body>
</html>
